<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>3D Racing Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
        canvas { display: block; }
        #hud { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            z-index: 10;
        }
        .hud-panel {
            position: absolute;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
        }
        #score-panel { top: 20px; left: 20px; }
        #time-panel { top: 20px; right: 20px; }
        #game-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
            pointer-events: auto;
        }
        #game-overlay h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        #game-overlay p {
            font-size: 1.2rem;
            margin: 10px 0;
            color: #ccc;
        }
        #game-overlay button {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            border: none;
            padding: 20px 50px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.5);
        }
        #game-overlay button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 30px rgba(239, 68, 68, 0.7);
        }
        .controls-hint {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .key {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            margin: 0 5px;
        }
        .floating-text {
            position: absolute;
            color: #ffd700;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            z-index: 50;
        }
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(1.2);
            }
        }
        #top-bar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            z-index: 20;
        }
        #score-display, #time-display {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 1.2rem;
            font-weight: bold;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        #settings-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            transition: all 0.3s ease;
        }
        #settings-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }
        #pause-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        #pause-menu h2 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 40px;
        }
        .menu-btn {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 1.3rem;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
            min-width: 200px;
        }
        .menu-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.5);
        }
        .menu-btn.exit {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
        }
        .menu-btn.exit:hover {
            box-shadow: 0 6px 20px rgba(244, 67, 54, 0.5);
        }
        /* 移动端控制按钮 */
        #mobile-controls {
            position: fixed;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: none;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 30;
            pointer-events: none;
        }
        .control-btn {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            color: white;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            transition: all 0.1s ease;
        }
        .control-btn:active {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0.95);
        }
        /* 移动端适配 */
        @media (max-width: 768px) {
            #mobile-controls {
                display: flex;
            }
            #top-bar {
                top: 10px;
                gap: 15px;
            }
            #score-display, #time-display {
                padding: 8px 15px;
                font-size: 1rem;
            }
            #settings-btn {
                top: 10px;
                right: 10px;
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="top-bar">
        <div id="score-display">Score: <span id="score">0</span></div>
        <div id="time-display">Time: <span id="time">60</span>s</div>
    </div>
    <button id="settings-btn">⚙️</button>
    
    <div id="mobile-controls">
        <div class="control-btn" id="left-btn">←</div>
        <div class="control-btn" id="right-btn">→</div>
    </div>
    
    <div id="game-overlay">
        <h1>🏎️ 3D 赛车游戏</h1>
        <p>躲避障碍物，坚持 60 秒！</p>
        <div class="controls-hint">
            <p>使用 <span class="key">←</span> <span class="key">→</span> 或 <span class="key">A</span> <span class="key">D</span> 控制方向</p>
            <p>按 ESC 键暂停游戏</p>
        </div>
        <button id="start-btn">开始游戏</button>
    </div>
    
    <div id="pause-menu">
        <h2>⏸️ 游戏暂停</h2>
        <button class="menu-btn" id="resume-btn">继续游戏</button>
        <button class="menu-btn" id="restart-btn">重新开始</button>
        <button class="menu-btn exit" id="exit-btn">退到大厅</button>
    </div>

    <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // ==================== CONSTANTS ====================
    const CONSTANTS = {
        ROAD_WIDTH: 20,
        ROAD_LENGTH: 200,
        LANE_COUNT: 4,
        LANE_WIDTH: 5,
        GAME_TIME: 60,
        CAR_SPEED: 0.8,
        OBSTACLE_SPEED_BASE: 0.5,
        SPAWN_RATE: 1500,
        COLORS: {
            road: 0x333333,
            roadLine: 0xffffff,
            grass: 0x4a7c3f,
            sky: 0x87CEEB,
            car: 0xef4444,
            obstacle: 0xff6b35
        }
    };

    // ==================== GAME STATE ====================
    let gameState = {
        started: false,
        over: false,
        score: 0,
        timeLeft: CONSTANTS.GAME_TIME,
        obstacles: [],
        stars: [],
        lastSpawnTime: 0,
        lastStarTime: 0
    };

    // ==================== SCENE SETUP ====================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(CONSTANTS.COLORS.sky);
    scene.fog = new THREE.Fog(CONSTANTS.COLORS.sky, 20, 80);

    // 检测是否为移动端
    const isMobile = window.innerWidth <= 768;
    
    const camera = new THREE.PerspectiveCamera(
        isMobile ? 75 : 60,  // 移动端更宽的视野
        window.innerWidth / window.innerHeight, 
        0.1, 
        1000
    );
    camera.position.set(0, isMobile ? 5 : 4, isMobile ? 18 : 15);
    camera.lookAt(0, 0.5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    // ==================== POST-PROCESSING ====================
    const composer = new EffectComposer(renderer);
    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        0.3, 0.4, 0.85
    );
    composer.addPass(bloomPass);

    // ==================== LIGHTING ====================
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xffffff, 2.0);
    sunLight.position.set(50, 100, 50);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 4096;
    sunLight.shadow.mapSize.height = 4096;
    sunLight.shadow.camera.near = 0.5;
    sunLight.shadow.camera.far = 200;
    sunLight.shadow.camera.left = -50;
    sunLight.shadow.camera.right = 50;
    sunLight.shadow.camera.top = 50;
    sunLight.shadow.camera.bottom = -50;
    sunLight.shadow.normalBias = 0.02;
    scene.add(sunLight);

    const fillLight = new THREE.DirectionalLight(0x88ccff, 0.5);
    fillLight.position.set(-50, 50, -50);
    scene.add(fillLight);

    // ==================== ASSET FACTORIES ====================
    function createCar(color = CONSTANTS.COLORS.car) {
        const g = new THREE.Group();
        const mat = (c) => new THREE.MeshStandardMaterial({ color: c, flatShading: true });

        // Body
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.5, 3.5), mat(color));
        body.position.y = 0.5;
        body.castShadow = true;

        // Cabin
        const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.4, 1.8), mat(0x333333));
        cabin.position.set(0, 0.9, -0.3);
        cabin.castShadow = true;

        // Windshield
        const windshield = new THREE.Mesh(
            new THREE.BoxGeometry(1.3, 0.35, 0.1),
            new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.7 })
        );
        windshield.position.set(0, 0.9, 0.6);
        windshield.rotation.x = -0.2;

        // Wheels
        const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.25, 16);
        const wheelMat = mat(0x222222);
        const positions = [[-0.9, 0.35, 1.2], [0.9, 0.35, 1.2], [-0.9, 0.35, -1.2], [0.9, 0.35, -1.2]];
        positions.forEach(([x, y, z]) => {
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.rotation.z = Math.PI / 2;
            wheel.position.set(x, y, z);
            wheel.castShadow = true;
            g.add(wheel);
        });

        // Headlights
        const lightGeo = new THREE.SphereGeometry(0.15, 8, 8);
        const lightMat = new THREE.MeshStandardMaterial({ 
            color: 0xffffcc, 
            emissive: 0xffffcc, 
            emissiveIntensity: 2 
        });
        const hl = new THREE.Mesh(lightGeo, lightMat);
        hl.position.set(-0.6, 0.5, 1.75);
        const hr = new THREE.Mesh(lightGeo, lightMat);
        hr.position.set(0.6, 0.5, 1.75);

        // Taillights
        const tailMat = new THREE.MeshStandardMaterial({ 
            color: 0xff0000, 
            emissive: 0xff0000, 
            emissiveIntensity: 1 
        });
        const tl = new THREE.Mesh(lightGeo, tailMat);
        tl.position.set(-0.6, 0.5, -1.75);
        const tr = new THREE.Mesh(lightGeo, tailMat);
        tr.position.set(0.6, 0.5, -1.75);

        g.add(body, cabin, windshield, hl, hr, tl, tr);
        return g;
    }

    function createObstacle() {
        const g = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({ 
            color: CONSTANTS.COLORS.obstacle, 
            flatShading: true 
        });

        // Main body
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.2, 1.5), mat);
        body.position.y = 0.6;
        body.castShadow = true;

        // Warning stripes
        const stripeGeo = new THREE.BoxGeometry(1.55, 0.2, 1.55);
        const stripeMat = new THREE.MeshStandardMaterial({ color: 0xffd700 });
        const stripe1 = new THREE.Mesh(stripeGeo, stripeMat);
        stripe1.position.y = 0.4;
        const stripe2 = new THREE.Mesh(stripeGeo, stripeMat);
        stripe2.position.y = 0.9;

        g.add(body, stripe1, stripe2);
        return g;
    }

    function createStar() {
        const g = new THREE.Group();
        
        // Star shape
        const starShape = new THREE.Shape();
        const points = 5;
        const outerRadius = 0.4;
        const innerRadius = 0.2;
        
        for (let i = 0; i < points * 2; i++) {
            const angle = (i / (points * 2)) * Math.PI * 2 - Math.PI / 2;
            const radius = i % 2 === 0 ? outerRadius : innerRadius;
            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius;
            if (i === 0) starShape.moveTo(x, y);
            else starShape.lineTo(x, y);
        }
        starShape.closePath();
        
        const extrudeSettings = { depth: 0.1, bevelEnabled: false };
        const starGeo = new THREE.ExtrudeGeometry(starShape, extrudeSettings);
        const starMat = new THREE.MeshStandardMaterial({ 
            color: 0xffd700,
            emissive: 0xffa500,
            emissiveIntensity: 0.5,
            metalness: 0.8,
            roughness: 0.2
        });
        const star = new THREE.Mesh(starGeo, starMat);
        star.rotation.x = -Math.PI / 2;
        star.position.y = 0.5;
        g.add(star);
        
        // Glow effect
        const glowGeo = new THREE.SphereGeometry(0.6, 16, 16);
        const glowMat = new THREE.MeshBasicMaterial({
            color: 0xffd700,
            transparent: true,
            opacity: 0.3
        });
        const glow = new THREE.Mesh(glowGeo, glowMat);
        glow.position.y = 0.3;
        g.add(glow);
        
        return g;
    }

    // ==================== ENVIRONMENT ====================
    // Road
    const roadGeo = new THREE.PlaneGeometry(CONSTANTS.ROAD_WIDTH, CONSTANTS.ROAD_LENGTH);
    const roadMat = new THREE.MeshStandardMaterial({ color: CONSTANTS.COLORS.road });
    const road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2;
    road.receiveShadow = true;
    scene.add(road);

    // Road lines
    for (let i = 1; i < CONSTANTS.LANE_COUNT; i++) {
        const lineGeo = new THREE.PlaneGeometry(0.2, CONSTANTS.ROAD_LENGTH);
        const lineMat = new THREE.MeshStandardMaterial({ color: CONSTANTS.COLORS.roadLine });
        const line = new THREE.Mesh(lineGeo, lineMat);
        line.rotation.x = -Math.PI / 2;
        line.position.set(
            -CONSTANTS.ROAD_WIDTH / 2 + i * CONSTANTS.LANE_WIDTH,
            0.01,
            0
        );
        scene.add(line);
    }

    // Grass on sides
    const grassGeo = new THREE.PlaneGeometry(50, CONSTANTS.ROAD_LENGTH);
    const grassMat = new THREE.MeshStandardMaterial({ color: CONSTANTS.COLORS.grass });
    
    const leftGrass = new THREE.Mesh(grassGeo, grassMat);
    leftGrass.rotation.x = -Math.PI / 2;
    leftGrass.position.set(-35, -0.1, 0);
    leftGrass.receiveShadow = true;
    scene.add(leftGrass);

    const rightGrass = new THREE.Mesh(grassGeo, grassMat);
    rightGrass.rotation.x = -Math.PI / 2;
    rightGrass.position.set(35, -0.1, 0);
    rightGrass.receiveShadow = true;
    scene.add(rightGrass);

    // Trees
    function createTree() {
        const g = new THREE.Group();
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
        const leavesMat = new THREE.MeshStandardMaterial({ color: 0x2d5a1e });

        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 1.5, 8), trunkMat);
        trunk.position.y = 0.75;
        trunk.castShadow = true;

        const leaves = new THREE.Mesh(new THREE.ConeGeometry(1.5, 3, 8), leavesMat);
        leaves.position.y = 2.5;
        leaves.castShadow = true;

        g.add(trunk, leaves);
        return g;
    }

    // Add trees
    for (let i = 0; i < 20; i++) {
        const tree = createTree();
        const side = Math.random() > 0.5 ? 1 : -1;
        tree.position.set(
            side * (15 + Math.random() * 15),
            0,
            -80 + Math.random() * 160
        );
        scene.add(tree);
    }

    // ==================== PLAYER ====================
    const player = createCar();
    player.position.set(0, 0, 5);
    scene.add(player);

    // ==================== INPUT ====================
    const keys = {};
    window.addEventListener('keydown', (e) => keys[e.key] = true);
    window.addEventListener('keyup', (e) => keys[e.key] = false);

    // ==================== GAME LOGIC ====================
    function spawnObstacle() {
        const lane = Math.floor(Math.random() * CONSTANTS.LANE_COUNT);
        const obstacle = createObstacle();
        obstacle.position.set(
            -CONSTANTS.ROAD_WIDTH / 2 + CONSTANTS.LANE_WIDTH / 2 + lane * CONSTANTS.LANE_WIDTH,
            0,
            -80
        );
        scene.add(obstacle);
        gameState.obstacles.push(obstacle);
    }

    function spawnStar() {
        const lane = Math.floor(Math.random() * CONSTANTS.LANE_COUNT);
        const star = createStar();
        star.position.set(
            -CONSTANTS.ROAD_WIDTH / 2 + CONSTANTS.LANE_WIDTH / 2 + lane * CONSTANTS.LANE_WIDTH,
            0,
            -80
        );
        scene.add(star);
        gameState.stars.push(star);
    }

    function checkCollision() {
        const playerBox = new THREE.Box3().setFromObject(player);
        playerBox.expandByScalar(-0.3);

        // Check obstacles
        for (const obstacle of gameState.obstacles) {
            const obstacleBox = new THREE.Box3().setFromObject(obstacle);
            if (playerBox.intersectsBox(obstacleBox)) {
                return 'crash';
            }
        }

        // Check stars
        for (let i = gameState.stars.length - 1; i >= 0; i--) {
            const star = gameState.stars[i];
            const starBox = new THREE.Box3().setFromObject(star);
            if (playerBox.intersectsBox(starBox)) {
                // 获取星星在屏幕上的位置
                const starPos = star.position.clone();
                starPos.project(camera);
                const x = (starPos.x * 0.5 + 0.5) * window.innerWidth;
                const y = (-starPos.y * 0.5 + 0.5) * window.innerHeight;
                
                scene.remove(star);
                gameState.stars.splice(i, 1);
                gameState.score += 50;
                document.getElementById('score').textContent = gameState.score;
                
                // 显示浮动文字在星星位置
                const floatingText = document.createElement('div');
                floatingText.className = 'floating-text';
                floatingText.textContent = '+50';
                floatingText.style.left = x + 'px';
                floatingText.style.top = y + 'px';
                document.body.appendChild(floatingText);
                setTimeout(() => floatingText.remove(), 1000);
            }
        }

        return null;
    }

    function updateGame(delta, timestamp) {
        if (!gameState.started || gameState.over) return;

        // Player movement
        const speed = 15 * delta;
        if ((keys['ArrowLeft'] || keys['a'] || keys['A']) && player.position.x > -8) {
            player.position.x -= speed;
            player.rotation.z = 0.1;
        } else if ((keys['ArrowRight'] || keys['d'] || keys['D']) && player.position.x < 8) {
            player.position.x += speed;
            player.rotation.z = -0.1;
        } else {
            player.rotation.z = 0;
        }

        // Spawn obstacles
        if (timestamp - gameState.lastSpawnTime > CONSTANTS.SPAWN_RATE) {
            spawnObstacle();
            gameState.lastSpawnTime = timestamp;
        }

        // Spawn stars
        if (timestamp - gameState.lastStarTime > 2000) {
            spawnStar();
            gameState.lastStarTime = timestamp;
        }

        // Update obstacles
        const obstacleSpeed = CONSTANTS.OBSTACLE_SPEED_BASE + (CONSTANTS.GAME_TIME - gameState.timeLeft) * 0.01;
        for (let i = gameState.obstacles.length - 1; i >= 0; i--) {
            const obstacle = gameState.obstacles[i];
            obstacle.position.z += obstacleSpeed * delta * 60;

            if (obstacle.position.z > 20) {
                scene.remove(obstacle);
                gameState.obstacles.splice(i, 1);
                gameState.score += 10;
                document.getElementById('score').textContent = gameState.score;
            }
        }

        // Update stars (rotate and move)
        for (let i = gameState.stars.length - 1; i >= 0; i--) {
            const star = gameState.stars[i];
            star.rotation.y += 3 * delta;
            star.position.z += obstacleSpeed * delta * 60;

            if (star.position.z > 20) {
                scene.remove(star);
                gameState.stars.splice(i, 1);
            }
        }

        // Check collision
        const collision = checkCollision();
        if (collision === 'crash') {
            gameOver(false);
        }
    }

    function startGame() {
        gameState.started = true;
        gameState.over = false;
        gameState.score = 0;
        gameState.timeLeft = CONSTANTS.GAME_TIME;
        gameState.obstacles.forEach(o => scene.remove(o));
        gameState.obstacles = [];
        gameState.stars.forEach(s => scene.remove(s));
        gameState.stars = [];
        gameState.lastSpawnTime = 0;
        gameState.lastStarTime = 0;
        player.position.set(0, 0, 5);

        document.getElementById('game-overlay').style.display = 'none';
        document.getElementById('score').textContent = '0';
        document.getElementById('time').textContent = CONSTANTS.GAME_TIME;

        // Timer
        const timer = setInterval(() => {
            if (!gameState.started || gameState.over) {
                clearInterval(timer);
                return;
            }
            gameState.timeLeft--;
            document.getElementById('time').textContent = gameState.timeLeft;
            if (gameState.timeLeft <= 0) {
                clearInterval(timer);
                gameOver(true);
            }
        }, 1000);
    }

    function gameOver(won) {
        gameState.over = true;
        const overlay = document.getElementById('game-overlay');
        overlay.style.display = 'flex';
        overlay.innerHTML = `
            <h1>${won ? '🎉 恭喜通关！' : '💥 撞车了！'}</h1>
            <p>最终分数: ${gameState.score}</p>
            <button id="restart-btn">再玩一次</button>
        `;
        document.getElementById('restart-btn').addEventListener('click', () => {
            location.reload();
        });
    }

    document.getElementById('start-btn').addEventListener('click', startGame);

    // Pause functionality
    let isPaused = false;
    const pauseMenu = document.getElementById('pause-menu');
    
    function togglePause() {
        if (!gameState.started || gameState.over) return;
        isPaused = !isPaused;
        pauseMenu.style.display = isPaused ? 'flex' : 'none';
    }
    
    document.getElementById('settings-btn').addEventListener('click', togglePause);
    
    document.getElementById('resume-btn').addEventListener('click', () => {
        isPaused = false;
        pauseMenu.style.display = 'none';
    });
    
    document.getElementById('restart-btn').addEventListener('click', () => {
        location.reload();
    });
    
    document.getElementById('exit-btn').addEventListener('click', () => {
        gameState.started = false;
        gameState.over = false;
        isPaused = false;
        pauseMenu.style.display = 'none';
        document.getElementById('game-overlay').style.display = 'flex';
        document.getElementById('game-overlay').innerHTML = `
            <h1>🏎️ 3D 赛车游戏</h1>
            <p>躲避障碍物，坚持 60 秒！</p>
            <div class="controls-hint">
                <p>使用 <span class="key">←</span> <span class="key">→</span> 或 <span class="key">A</span> <span class="key">D</span> 控制方向</p>
                <p>按 ESC 键暂停游戏</p>
            </div>
            <button id="start-btn">开始游戏</button>
        `;
        document.getElementById('start-btn').addEventListener('click', startGame);
    });
    
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            togglePause();
        }
    });

    // 移动端触摸控制
    const leftBtn = document.getElementById('left-btn');
    const rightBtn = document.getElementById('right-btn');
    
    leftBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        keys['ArrowLeft'] = true;
    });
    leftBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
        keys['ArrowLeft'] = false;
    });
    leftBtn.addEventListener('mousedown', () => keys['ArrowLeft'] = true);
    leftBtn.addEventListener('mouseup', () => keys['ArrowLeft'] = false);
    leftBtn.addEventListener('mouseleave', () => keys['ArrowLeft'] = false);
    
    rightBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        keys['ArrowRight'] = true;
    });
    rightBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
        keys['ArrowRight'] = false;
    });
    rightBtn.addEventListener('mousedown', () => keys['ArrowRight'] = true);
    rightBtn.addEventListener('mouseup', () => keys['ArrowRight'] = false);
    rightBtn.addEventListener('mouseleave', () => keys['ArrowRight'] = false);

    // ==================== MAIN LOOP ====================
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        if (isPaused) return;
        const delta = clock.getDelta();
        updateGame(delta, performance.now());
        composer.render();
    }

    animate();

    // ==================== RESIZE ====================
    window.addEventListener('resize', () => {
        const newIsMobile = window.innerWidth <= 768;
        camera.fov = newIsMobile ? 75 : 60;
        camera.position.y = newIsMobile ? 5 : 4;
        camera.position.z = newIsMobile ? 18 : 15;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    });
    </script>
</body>
</html>
