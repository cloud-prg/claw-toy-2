<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>3D Racing Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
        canvas { display: block; }
        #hud { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            z-index: 10;
        }
        .hud-panel {
            position: absolute;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
        }
        #score-panel { top: 20px; left: 20px; }
        #time-panel { top: 20px; right: 20px; }
        #game-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
            pointer-events: auto;
        }
        #game-overlay h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        #game-overlay p {
            font-size: 1.2rem;
            margin: 10px 0;
            color: #ccc;
        }
        #game-overlay button {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            border: none;
            padding: 20px 50px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.5);
        }
        #game-overlay button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 30px rgba(239, 68, 68, 0.7);
        }
        .controls-hint {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .key {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            margin: 0 5px;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="hud">
        <div id="score-panel" class="hud-panel">分数: <span id="score">0</span></div>
        <div id="time-panel" class="hud-panel">时间: <span id="time">60</span>s</div>
    </div>
    <div id="game-overlay">
        <h1>🏎️ 3D 赛车游戏</h1>
        <p>躲避障碍物，坚持 60 秒！</p>
        <div class="controls-hint">
            <p>使用 <span class="key">←</span> <span class="key">→</span> 或 <span class="key">A</span> <span class="key">D</span> 控制方向</p>
        </div>
        <button id="start-btn">开始游戏</button>
    </div>

    <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // ==================== CONSTANTS ====================
    const CONSTANTS = {
        ROAD_WIDTH: 20,
        ROAD_LENGTH: 200,
        LANE_COUNT: 4,
        LANE_WIDTH: 5,
        GAME_TIME: 60,
        CAR_SPEED: 0.8,
        OBSTACLE_SPEED_BASE: 0.5,
        SPAWN_RATE: 1500,
        COLORS: {
            road: 0x333333,
            roadLine: 0xffffff,
            grass: 0x4a7c3f,
            sky: 0x87CEEB,
            car: 0xef4444,
            obstacle: 0xff6b35
        }
    };

    // ==================== GAME STATE ====================
    let gameState = {
        started: false,
        over: false,
        score: 0,
        timeLeft: CONSTANTS.GAME_TIME,
        obstacles: [],
        lastSpawnTime: 0
    };

    // ==================== SCENE SETUP ====================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(CONSTANTS.COLORS.sky);
    scene.fog = new THREE.Fog(CONSTANTS.COLORS.sky, 20, 80);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    // ==================== POST-PROCESSING ====================
    const composer = new EffectComposer(renderer);
    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        0.3, 0.4, 0.85
    );
    composer.addPass(bloomPass);

    // ==================== LIGHTING ====================
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xffffff, 2.0);
    sunLight.position.set(50, 100, 50);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 4096;
    sunLight.shadow.mapSize.height = 4096;
    sunLight.shadow.camera.near = 0.5;
    sunLight.shadow.camera.far = 200;
    sunLight.shadow.camera.left = -50;
    sunLight.shadow.camera.right = 50;
    sunLight.shadow.camera.top = 50;
    sunLight.shadow.camera.bottom = -50;
    sunLight.shadow.normalBias = 0.02;
    scene.add(sunLight);

    const fillLight = new THREE.DirectionalLight(0x88ccff, 0.5);
    fillLight.position.set(-50, 50, -50);
    scene.add(fillLight);

    // ==================== ASSET FACTORIES ====================
    function createCar(color = CONSTANTS.COLORS.car) {
        const g = new THREE.Group();
        const mat = (c) => new THREE.MeshStandardMaterial({ color: c, flatShading: true });

        // Body
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.5, 3.5), mat(color));
        body.position.y = 0.5;
        body.castShadow = true;

        // Cabin
        const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.4, 1.8), mat(0x333333));
        cabin.position.set(0, 0.9, -0.3);
        cabin.castShadow = true;

        // Windshield
        const windshield = new THREE.Mesh(
            new THREE.BoxGeometry(1.3, 0.35, 0.1),
            new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.7 })
        );
        windshield.position.set(0, 0.9, 0.6);
        windshield.rotation.x = -0.2;

        // Wheels
        const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.25, 16);
        const wheelMat = mat(0x222222);
        const positions = [[-0.9, 0.35, 1.2], [0.9, 0.35, 1.2], [-0.9, 0.35, -1.2], [0.9, 0.35, -1.2]];
        positions.forEach(([x, y, z]) => {
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.rotation.z = Math.PI / 2;
            wheel.position.set(x, y, z);
            wheel.castShadow = true;
            g.add(wheel);
        });

        // Headlights
        const lightGeo = new THREE.SphereGeometry(0.15, 8, 8);
        const lightMat = new THREE.MeshStandardMaterial({ 
            color: 0xffffcc, 
            emissive: 0xffffcc, 
            emissiveIntensity: 2 
        });
        const hl = new THREE.Mesh(lightGeo, lightMat);
        hl.position.set(-0.6, 0.5, 1.75);
        const hr = new THREE.Mesh(lightGeo, lightMat);
        hr.position.set(0.6, 0.5, 1.75);

        // Taillights
        const tailMat = new THREE.MeshStandardMaterial({ 
            color: 0xff0000, 
            emissive: 0xff0000, 
            emissiveIntensity: 1 
        });
        const tl = new THREE.Mesh(lightGeo, tailMat);
        tl.position.set(-0.6, 0.5, -1.75);
        const tr = new THREE.Mesh(lightGeo, tailMat);
        tr.position.set(0.6, 0.5, -1.75);

        g.add(body, cabin, windshield, hl, hr, tl, tr);
        return g;
    }

    function createObstacle() {
        const g = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({ 
            color: CONSTANTS.COLORS.obstacle, 
            flatShading: true 
        });

        // Main body
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.2, 1.5), mat);
        body.position.y = 0.6;
        body.castShadow = true;

        // Warning stripes
        const stripeGeo = new THREE.BoxGeometry(1.55, 0.2, 1.55);
        const stripeMat = new THREE.MeshStandardMaterial({ color: 0xffd700 });
        const stripe1 = new THREE.Mesh(stripeGeo, stripeMat);
        stripe1.position.y = 0.4;
        const stripe2 = new THREE.Mesh(stripeGeo, stripeMat);
        stripe2.position.y = 0.9;

        g.add(body, stripe1, stripe2);
        return g;
    }

    // ==================== ENVIRONMENT ====================
    // Road
    const roadGeo = new THREE.PlaneGeometry(CONSTANTS.ROAD_WIDTH, CONSTANTS.ROAD_LENGTH);
    const roadMat = new THREE.MeshStandardMaterial({ color: CONSTANTS.COLORS.road });
    const road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2;
    road.receiveShadow = true;
    scene.add(road);

    // Road lines
    for (let i = 1; i < CONSTANTS.LANE_COUNT; i++) {
        const lineGeo = new THREE.PlaneGeometry(0.2, CONSTANTS.ROAD_LENGTH);
        const lineMat = new THREE.MeshStandardMaterial({ color: CONSTANTS.COLORS.roadLine });
        const line = new THREE.Mesh(lineGeo, lineMat);
        line.rotation.x = -Math.PI / 2;
        line.position.set(
            -CONSTANTS.ROAD_WIDTH / 2 + i * CONSTANTS.LANE_WIDTH,
            0.01,
            0
        );
        scene.add(line);
    }

    // Grass on sides
    const grassGeo = new THREE.PlaneGeometry(50, CONSTANTS.ROAD_LENGTH);
    const grassMat = new THREE.MeshStandardMaterial({ color: CONSTANTS.COLORS.grass });
    
    const leftGrass = new THREE.Mesh(grassGeo, grassMat);
    leftGrass.rotation.x = -Math.PI / 2;
    leftGrass.position.set(-35, -0.1, 0);
    leftGrass.receiveShadow = true;
    scene.add(leftGrass);

    const rightGrass = new THREE.Mesh(grassGeo, grassMat);
    rightGrass.rotation.x = -Math.PI / 2;
    rightGrass.position.set(35, -0.1, 0);
    rightGrass.receiveShadow = true;
    scene.add(rightGrass);

    // Trees
    function createTree() {
        const g = new THREE.Group();
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
        const leavesMat = new THREE.MeshStandardMaterial({ color: 0x2d5a1e });

        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 1.5, 8), trunkMat);
        trunk.position.y = 0.75;
        trunk.castShadow = true;

        const leaves = new THREE.Mesh(new THREE.ConeGeometry(1.5, 3, 8), leavesMat);
        leaves.position.y = 2.5;
        leaves.castShadow = true;

        g.add(trunk, leaves);
        return g;
    }

    // Add trees
    for (let i = 0; i < 20; i++) {
        const tree = createTree();
        const side = Math.random() > 0.5 ? 1 : -1;
        tree.position.set(
            side * (15 + Math.random() * 15),
            0,
            -80 + Math.random() * 160
        );
        scene.add(tree);
    }

    // ==================== PLAYER ====================
    const player = createCar();
    player.position.set(0, 0, 0);
    scene.add(player);

    // ==================== INPUT ====================
    const keys = {};
    window.addEventListener('keydown', (e) => keys[e.key] = true);
    window.addEventListener('keyup', (e) => keys[e.key] = false);

    // ==================== GAME LOGIC ====================
    function spawnObstacle() {
        const lane = Math.floor(Math.random() * CONSTANTS.LANE_COUNT);
        const obstacle = createObstacle();
        obstacle.position.set(
            -CONSTANTS.ROAD_WIDTH / 2 + CONSTANTS.LANE_WIDTH / 2 + lane * CONSTANTS.LANE_WIDTH,
            0,
            -80
        );
        scene.add(obstacle);
        gameState.obstacles.push(obstacle);
    }

    function checkCollision() {
        const playerBox = new THREE.Box3().setFromObject(player);
        playerBox.expandByScalar(-0.3);

        for (const obstacle of gameState.obstacles) {
            const obstacleBox = new THREE.Box3().setFromObject(obstacle);
            if (playerBox.intersectsBox(obstacleBox)) {
                return true;
            }
        }
        return false;
    }

    function updateGame(delta, timestamp) {
        if (!gameState.started || gameState.over) return;

        // Player movement
        const speed = 15 * delta;
        if ((keys['ArrowLeft'] || keys['a'] || keys['A']) && player.position.x > -8) {
            player.position.x -= speed;
            player.rotation.z = 0.1;
        } else if ((keys['ArrowRight'] || keys['d'] || keys['D']) && player.position.x < 8) {
            player.position.x += speed;
            player.rotation.z = -0.1;
        } else {
            player.rotation.z = 0;
        }

        // Spawn obstacles
        if (timestamp - gameState.lastSpawnTime > CONSTANTS.SPAWN_RATE) {
            spawnObstacle();
            gameState.lastSpawnTime = timestamp;
        }

        // Update obstacles
        const obstacleSpeed = CONSTANTS.OBSTACLE_SPEED_BASE + (CONSTANTS.GAME_TIME - gameState.timeLeft) * 0.01;
        for (let i = gameState.obstacles.length - 1; i >= 0; i--) {
            const obstacle = gameState.obstacles[i];
            obstacle.position.z += obstacleSpeed * delta * 60;

            if (obstacle.position.z > 20) {
                scene.remove(obstacle);
                gameState.obstacles.splice(i, 1);
                gameState.score += 10;
                document.getElementById('score').textContent = gameState.score;
            }
        }

        // Check collision
        if (checkCollision()) {
            gameOver(false);
        }
    }

    function startGame() {
        gameState.started = true;
        gameState.over = false;
        gameState.score = 0;
        gameState.timeLeft = CONSTANTS.GAME_TIME;
        gameState.obstacles.forEach(o => scene.remove(o));
        gameState.obstacles = [];
        gameState.lastSpawnTime = 0;
        player.position.set(0, 0, 8);

        document.getElementById('game-overlay').style.display = 'none';
        document.getElementById('score').textContent = '0';
        document.getElementById('time').textContent = CONSTANTS.GAME_TIME;

        // Timer
        const timer = setInterval(() => {
            if (!gameState.started || gameState.over) {
                clearInterval(timer);
                return;
            }
            gameState.timeLeft--;
            document.getElementById('time').textContent = gameState.timeLeft;
            if (gameState.timeLeft <= 0) {
                clearInterval(timer);
                gameOver(true);
            }
        }, 1000);
    }

    function gameOver(won) {
        gameState.over = true;
        const overlay = document.getElementById('game-overlay');
        overlay.style.display = 'flex';
        overlay.innerHTML = `
            <h1>${won ? '🎉 恭喜通关！' : '💥 撞车了！'}</h1>
            <p>最终分数: ${gameState.score}</p>
            <button id="restart-btn">再玩一次</button>
        `;
        document.getElementById('restart-btn').addEventListener('click', () => {
            location.reload();
        });
    }

    document.getElementById('start-btn').addEventListener('click', startGame);

    // ==================== MAIN LOOP ====================
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        updateGame(delta, performance.now());
        composer.render();
    }

    animate();

    // ==================== RESIZE ====================
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    });
    </script>
</body>
</html>
